name: Build Demo Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web/**'

permissions:
  id-token: write
  # write, not read: this workflow bot-commits the new image tag into
  # k8s/demo-site/deployment.yaml (see the last step below) so ArgoCD's
  # GitOps diff has a real, git-tracked change to sync against.
  contents: write

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::ACCOUNT_ID_REDACTED:role/github-actions-resume-site
  ECR_REPOSITORY: resume-site-demo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: web
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Pin the new image tag in the GitOps manifest
        run: |
          sed -i "s|${ECR_REPOSITORY}:.*|${ECR_REPOSITORY}:${GITHUB_SHA}|" k8s/demo-site/deployment.yaml
          if git diff --quiet -- k8s/demo-site/deployment.yaml; then
            echo "No image tag change, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/demo-site/deployment.yaml
          git commit -m "chore: bump demo-site image to ${GITHUB_SHA}"
          git push
