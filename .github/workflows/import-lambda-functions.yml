name: Import Lambda Functions and Permissions (temporary)

# aws_lambda_function.{correspondence,log_viewer,opportunity,settings} and
# their AllowApiGatewayInvoke permissions were never imported - only their
# IAM roles were, in the very first batch. Function names are globally
# unique, so a plain create would hit the same "already exists" pattern as
# everything else - importing cleanly instead of wasting an apply attempt
# on it. Delete this workflow once done.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform/site
  AWS_ROLE_ARN: arn:aws:iam::955752000541:role/github-actions-resume-site
  TF_VAR_dashboard_username: ${{ secrets.DASHBOARD_USERNAME }}
  TF_VAR_dashboard_password: ${{ secrets.DASHBOARD_PASSWORD }}
  TF_VAR_notify_email: windham.matt@gmail.com
  TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
  TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  TF_VAR_github_dispatch_token: ${{ secrets.GITHUB_DISPATCH_TOKEN }}

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Import Lambda functions and permissions
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          failed=0

          run_import() {
            addr="$1"
            id="$2"
            echo "=== importing $addr ==="
            if terraform import "$addr" "$id"; then
              echo "--- OK: $addr ---"
            else
              echo "--- FAILED: $addr ---"
              failed=$((failed + 1))
            fi
            echo
          }

          run_import aws_lambda_function.correspondence resume-site-correspondence
          run_import aws_lambda_function.log_viewer resume-site-log-viewer
          run_import aws_lambda_function.opportunity resume-site-opportunity
          run_import aws_lambda_function.settings resume-site-settings

          run_import aws_lambda_permission.correspondence_apigateway resume-site-correspondence/AllowApiGatewayInvoke
          run_import aws_lambda_permission.log_viewer_apigateway resume-site-log-viewer/AllowApiGatewayInvoke
          run_import aws_lambda_permission.opportunity_apigateway resume-site-opportunity/AllowApiGatewayInvoke
          run_import aws_lambda_permission.settings_apigateway resume-site-settings/AllowApiGatewayInvoke

          echo "============================================"
          if [ "$failed" -eq 0 ]; then
            echo "All imports succeeded."
          else
            echo "$failed import(s) failed - see above."
          fi

      - name: Terraform plan (see what's left)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -input=false
