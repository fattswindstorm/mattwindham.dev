name: Fix log_viewer Route Import (temporary)

# Final piece of the API Gateway state cleanup - the route import failed
# twice because it used the route's key ($default, the human-readable
# pattern) instead of its actual ID (bzk46o0) as the import ID. The parent
# API import already succeeded. Delete this workflow once done.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform/site
  AWS_ROLE_ARN: arn:aws:iam::955752000541:role/github-actions-resume-site
  TF_VAR_dashboard_username: ${{ secrets.DASHBOARD_USERNAME }}
  TF_VAR_dashboard_password: ${{ secrets.DASHBOARD_PASSWORD }}
  TF_VAR_notify_email: windham.matt@gmail.com
  TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
  TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  TF_VAR_github_dispatch_token: ${{ secrets.DISPATCH_TOKEN }}

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Import the log_viewer route with the correct route ID
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform import aws_apigatewayv2_route.log_viewer 16awjv81h6/bzk46o0

      - name: Terraform plan (see what's left)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -input=false
