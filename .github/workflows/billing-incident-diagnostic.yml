name: Billing Incident Diagnostic (temporary)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::955752000541:role/github-actions-resume-site

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Account identity
        run: aws sts get-caller-identity

      - name: Cost and usage - month to date, by service
        run: |
          START=$(date -u +%Y-%m-01)
          END=$(date -u +%Y-%m-%d)
          aws ce get-cost-and-usage \
            --time-period Start=$START,End=$END \
            --granularity MONTHLY \
            --metrics "UnblendedCost" "UsageQuantity" \
            --group-by Type=DIMENSION,Key=SERVICE \
            --output table

      - name: Cost and usage - month to date, S3 by usage type
        run: |
          START=$(date -u +%Y-%m-01)
          END=$(date -u +%Y-%m-%d)
          aws ce get-cost-and-usage \
            --time-period Start=$START,End=$END \
            --granularity MONTHLY \
            --metrics "UnblendedCost" "UsageQuantity" \
            --group-by Type=DIMENSION,Key=USAGE_TYPE \
            --filter '{"Dimensions": {"Key": "SERVICE", "Values": ["Amazon Simple Storage Service"]}}' \
            --output table

      - name: Cost and usage - month to date, RDS by usage type
        run: |
          START=$(date -u +%Y-%m-01)
          END=$(date -u +%Y-%m-%d)
          aws ce get-cost-and-usage \
            --time-period Start=$START,End=$END \
            --granularity MONTHLY \
            --metrics "UnblendedCost" "UsageQuantity" \
            --group-by Type=DIMENSION,Key=USAGE_TYPE \
            --filter '{"Dimensions": {"Key": "SERVICE", "Values": ["Amazon Relational Database Service"]}}' \
            --output table

      - name: Cost and usage - RDS and S3, DAILY granularity (pin down exact dates)
        run: |
          START=$(date -u -d '5 days ago' +%Y-%m-%d 2>/dev/null || date -u -v-5d +%Y-%m-%d)
          END=$(date -u +%Y-%m-%d)
          aws ce get-cost-and-usage \
            --time-period Start=$START,End=$END \
            --granularity DAILY \
            --metrics "UnblendedCost" \
            --group-by Type=DIMENSION,Key=SERVICE \
            --filter '{"Dimensions": {"Key": "SERVICE", "Values": ["Amazon Relational Database Service", "Amazon Simple Storage Service"]}}' \
            --output table

      - name: Is this account part of an AWS Organization, and is cost coming from a different linked account?
        run: |
          echo "--- Organization info ---"
          aws organizations describe-organization --output table 2>&1 || echo "(not in an org, or no permission)"
          echo "--- This account's own ID/details ---"
          aws organizations describe-account --account-id $(aws sts get-caller-identity --query Account --output text) --output table 2>&1 || echo "(no permission / not applicable)"
          echo "--- Cost by linked account, month to date ---"
          START=$(date -u +%Y-%m-01)
          END=$(date -u +%Y-%m-%d)
          aws ce get-cost-and-usage \
            --time-period Start=$START,End=$END \
            --granularity MONTHLY \
            --metrics "UnblendedCost" \
            --group-by Type=DIMENSION,Key=LINKED_ACCOUNT \
            --output table 2>&1 || echo "(LINKED_ACCOUNT grouping unavailable - likely means this is not a payer/management account view)"

      - name: Cost forecast - rest of month
        run: |
          START=$(date -u +%Y-%m-%d)
          END=$(date -u -d "$(date -u +%Y-%m-01) +1 month" +%Y-%m-%d 2>/dev/null || date -u -v+1m -v1d +%Y-%m-%d)
          aws ce get-cost-forecast \
            --time-period Start=$START,End=$END \
            --metric UNBLENDED_COST \
            --granularity MONTHLY \
            --output table || echo "(forecast unavailable - often the case with <1 full day of history for a new cost pattern)"

      - name: Anomaly detection - any active cost anomalies
        run: aws ce get-anomalies --date-interval StartDate=$(date -u -d '14 days ago' +%Y-%m-%d 2>/dev/null || date -u -v-14d +%Y-%m-%d),EndDate=$(date -u +%Y-%m-%d) --output table || echo "(no anomaly monitor configured, or none found)"

      - name: All S3 buckets in this account (not just Terraform-managed ones)
        run: aws s3api list-buckets --query 'Buckets[].Name' --output table

      - name: S3 bucket sizes (CloudWatch, last 2 days)
        run: |
          for BUCKET in $(aws s3api list-buckets --query 'Buckets[].Name' --output text); do
            echo "=== $BUCKET ==="
            REGION=$(aws s3api get-bucket-location --bucket "$BUCKET" --query 'LocationConstraint' --output text)
            [ "$REGION" = "None" ] && REGION=us-east-1
            aws cloudwatch get-metric-statistics \
              --namespace AWS/S3 \
              --metric-name BucketSizeBytes \
              --dimensions Name=BucketName,Value="$BUCKET" Name=StorageType,Value=StandardStorage \
              --start-time "$(date -u -d '2 days ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -u -v-2d +%Y-%m-%dT%H:%M:%S)" \
              --end-time "$(date -u +%Y-%m-%dT%H:%M:%S)" \
              --period 86400 \
              --statistics Average \
              --region "$REGION" \
              --output table 2>&1 || echo "(no data / access issue for $BUCKET)"
          done

      - name: IAM users and their access keys (looking for anything unrecognized)
        run: |
          aws iam list-users --output table
          echo "--- access keys per user ---"
          for USER in $(aws iam list-users --query 'Users[].UserName' --output text); do
            echo "=== $USER ==="
            aws iam list-access-keys --user-name "$USER" --output table
          done

      - name: IAM roles (looking for anything unrecognized)
        run: aws iam list-roles --query 'Roles[].{Name:RoleName,Created:CreateDate}' --output table

      - name: Access key last-used - is terraform-deployer's key actively in use right now
        run: |
          for USER in $(aws iam list-users --query 'Users[].UserName' --output text); do
            for KEY in $(aws iam list-access-keys --user-name "$USER" --query 'AccessKeyMetadata[].AccessKeyId' --output text); do
              echo "=== $USER / $KEY ==="
              aws iam get-access-key-last-used --access-key-id "$KEY" --output table
            done
          done

      - name: RDS instances - every region including opt-in
        run: |
          for REGION in $(aws ec2 describe-regions --all-regions --query 'Regions[].RegionName' --output text); do
            COUNT=$(aws rds describe-db-instances --region "$REGION" --query 'length(DBInstances)' --output text 2>/dev/null || echo "ERR")
            if [ "$COUNT" != "0" ] && [ "$COUNT" != "ERR" ]; then
              echo "=== $REGION: $COUNT instance(s) ==="
              aws rds describe-db-instances --region "$REGION" \
                --query 'DBInstances[].{Id:DBInstanceIdentifier,Class:DBInstanceClass,Engine:Engine,Status:DBInstanceStatus,Storage:AllocatedStorage,Created:InstanceCreateTime,Public:PubliclyAccessible}' \
                --output table
            fi
          done
          echo "(regions with 0 instances or access errors are omitted above)"

      - name: RDS snapshots (instance + cluster, manual + automated) - every region including opt-in
        run: |
          for REGION in $(aws ec2 describe-regions --all-regions --query 'Regions[].RegionName' --output text); do
            SNAP_COUNT=$(aws rds describe-db-snapshots --region "$REGION" --query 'length(DBSnapshots)' --output text 2>/dev/null || echo "ERR")
            if [ "$SNAP_COUNT" != "0" ] && [ "$SNAP_COUNT" != "ERR" ]; then
              echo "=== $REGION: $SNAP_COUNT DB snapshot(s) ==="
              aws rds describe-db-snapshots --region "$REGION" \
                --query 'DBSnapshots[].{Id:DBSnapshotIdentifier,SourceDB:DBInstanceIdentifier,Storage:AllocatedStorage,Created:SnapshotCreateTime,Type:SnapshotType}' \
                --output table
            fi
            CLUSTER_SNAP_COUNT=$(aws rds describe-db-cluster-snapshots --region "$REGION" --query 'length(DBClusterSnapshots)' --output text 2>/dev/null || echo "ERR")
            if [ "$CLUSTER_SNAP_COUNT" != "0" ] && [ "$CLUSTER_SNAP_COUNT" != "ERR" ]; then
              echo "=== $REGION: $CLUSTER_SNAP_COUNT cluster snapshot(s) ==="
              aws rds describe-db-cluster-snapshots --region "$REGION" \
                --query 'DBClusterSnapshots[].{Id:DBClusterSnapshotIdentifier,SourceCluster:DBClusterIdentifier,Storage:AllocatedStorage,Created:SnapshotCreateTime,Type:SnapshotType}' \
                --output table
            fi
          done
          echo "(regions with 0 snapshots or access errors are omitted above)"

      - name: CloudTrail - all activity by terraform-deployer, last 90 days (max lookback)
        run: |
          aws cloudtrail lookup-events \
            --lookup-attributes AttributeKey=Username,AttributeValue=terraform-deployer \
            --start-time "$(date -u -d '90 days ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -u -v-90d +%Y-%m-%dT%H:%M:%S)" \
            --max-results 500 \
            --query 'Events[].{Time:EventTime,Name:EventName,Source:EventSource}' \
            --output table || echo "(CloudTrail lookup unavailable or empty)"

      - name: CloudTrail - all RDS create/write/delete events, last 90 days (max lookback)
        run: |
          aws cloudtrail lookup-events \
            --lookup-attributes AttributeKey=EventSource,AttributeValue=rds.amazonaws.com \
            --start-time "$(date -u -d '90 days ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -u -v-90d +%Y-%m-%dT%H:%M:%S)" \
            --max-results 500 \
            --query "Events[?Name!='DescribeDBInstances' && Name!='DescribeDBClusters' && Name!='DescribeDBSnapshots' && Name!='DescribeDBClusterSnapshots' && Name!='DescribeEvents' && Name!='DescribeDBRecommendations' && Name!='DescribeDBSubnetGroups' && Name!='DescribeDBSecurityGroups' && Name!='DescribeDBEngineVersions' && Name!='DescribeAccountAttributes' && Name!='DescribeTenantDatabases' && Name!='DescribePendingMaintenanceActions' && Name!='DescribeBlueGreenDeployments' && Name!='DescribeGlobalClusters' && Name!='DescribeDBClusterParameterGroups'].{Time:EventTime,Name:EventName,User:Username}" \
            --output table || echo "(CloudTrail lookup unavailable or empty)"

      - name: Recent CloudTrail S3 write events (last 3 days, non-root focus)
        run: |
          aws cloudtrail lookup-events \
            --lookup-attributes AttributeKey=EventSource,AttributeValue=s3.amazonaws.com \
            --start-time "$(date -u -d '3 days ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -u -v-3d +%Y-%m-%dT%H:%M:%S)" \
            --max-results 300 \
            --query "Events[?Username!='root'].{Time:EventTime,Name:EventName,User:Username}" \
            --output table || echo "(CloudTrail lookup unavailable or empty)"
