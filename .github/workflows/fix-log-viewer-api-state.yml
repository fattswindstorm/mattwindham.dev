name: Fix log_viewer API State (temporary)

# Follow-up to fix-api-gateway-state.yml - aws_apigatewayv2_api.log_viewer
# turned out to also already be tracked (pointing at something wrong,
# unconfirmed what), which made that run fail to reimport it and its route.
# Its integration DID successfully reimport under the correct live API,
# leaving state inconsistent between parent and child. Fixes that, then
# retries the route import. Delete this workflow once done.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform/site
  AWS_ROLE_ARN: arn:aws:iam::ACCOUNT_ID_REDACTED:role/github-actions-resume-site
  TF_VAR_dashboard_username: ${{ secrets.DASHBOARD_USERNAME }}
  TF_VAR_dashboard_password: ${{ secrets.DASHBOARD_PASSWORD }}
  TF_VAR_notify_email: REDACTED_EMAIL
  TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
  TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  TF_VAR_github_dispatch_token: ${{ secrets.DISPATCH_TOKEN }}

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Show current state before touching anything
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform state show aws_apigatewayv2_api.log_viewer || echo "(not in state)"

      - name: Remove mispointed entry and reimport correctly
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform state rm aws_apigatewayv2_api.log_viewer || echo "(already not tracked)"
          terraform import aws_apigatewayv2_api.log_viewer 16awjv81h6
          terraform import aws_apigatewayv2_route.log_viewer '16awjv81h6/$default'

      - name: Terraform plan (see what's left)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -input=false
