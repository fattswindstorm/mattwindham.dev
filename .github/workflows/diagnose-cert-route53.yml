name: Diagnose Cert Route53 (temporary)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::955752000541:role/github-actions-resume-site
  TF_WORKING_DIR: terraform/site
  TF_VAR_dashboard_username: ${{ secrets.DASHBOARD_USERNAME }}
  TF_VAR_dashboard_password: ${{ secrets.DASHBOARD_PASSWORD }}
  TF_VAR_notify_email: windham.matt@gmail.com
  TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
  TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  TF_VAR_github_dispatch_token: ${{ secrets.GITHUB_DISPATCH_TOKEN }}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: State list (cert-related resources)
        run: terraform state list | grep -i -E 'cert|acm' || echo "(no matches)"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Import the apex cert_validation record (state-only, no infra change)
        run: |
          ADDR='aws_route53_record.cert_validation["mattwindham.dev"]'
          if terraform state show "$ADDR" >/dev/null 2>&1; then
            echo "Already in state, skipping import."
          else
            terraform import "$ADDR" \
              'Z090356212OBKYAPYDLK1__c0c0ad710e9fcfe7d66770ef70e321dc.mattwindham.dev._CNAME'
          fi
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: State show - cert_validation apex record (post-import)
        run: terraform state show 'aws_route53_record.cert_validation["mattwindham.dev"]'
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform plan (no apply)
        run: terraform plan -no-color -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
