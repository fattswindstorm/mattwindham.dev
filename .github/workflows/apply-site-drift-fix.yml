name: Apply Site Drift Fix (temporary)

# Step 2 of 2 - only dispatch this after reviewing the full output of
# plan-site-drift-fix.yml. The aws_cognito_user_pool_client.portal
# force-replace issue is fixed via a lifecycle.ignore_changes block in
# auth.tf rather than a CLI flag - -exclude turned out to not be a real
# terraform plan/apply flag. Delete both workflows once applied and
# confirmed clean - terraform.yml's normal push-to-main flow resumes after
# this.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform/site
  AWS_ROLE_ARN: arn:aws:iam::955752000541:role/github-actions-resume-site
  TF_VAR_dashboard_username: ${{ secrets.DASHBOARD_USERNAME }}
  TF_VAR_dashboard_password: ${{ secrets.DASHBOARD_PASSWORD }}
  TF_VAR_notify_email: windham.matt@gmail.com
  TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
  TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  TF_VAR_github_dispatch_token: ${{ secrets.DISPATCH_TOKEN }}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform plan (confirm nothing is left)
        run: terraform plan -no-color -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
