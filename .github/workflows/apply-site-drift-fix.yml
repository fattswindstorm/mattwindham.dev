name: Apply Site Drift Fix (temporary)

# Step 2 of 2 - only dispatch this after reviewing the full output of
# plan-site-drift-fix.yml. Excludes aws_cognito_user_pool_client.portal - a
# Terraform import artifact (generate_secret can't be read back via the
# API, so import can't populate it correctly) that would otherwise
# force-replace the live auth client, generating a new client ID and
# breaking every current session, for no actual reason (the real value
# already matches config). Delete both workflows once applied and
# confirmed clean - terraform.yml's normal push-to-main flow resumes after
# this.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform/site
  AWS_ROLE_ARN: arn:aws:iam::ACCOUNT_ID_REDACTED:role/github-actions-resume-site
  TF_VAR_dashboard_username: ${{ secrets.DASHBOARD_USERNAME }}
  TF_VAR_dashboard_password: ${{ secrets.DASHBOARD_PASSWORD }}
  TF_VAR_notify_email: REDACTED_EMAIL
  TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
  TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  TF_VAR_github_dispatch_token: ${{ secrets.GITHUB_DISPATCH_TOKEN }}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform apply (excluding the Cognito client)
        run: terraform apply -auto-approve -input=false -exclude=aws_cognito_user_pool_client.portal
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform plan (confirm only the excluded resource remains)
        run: terraform plan -no-color -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
