server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # Mirrors terraform/site/main.tf's aws_cloudfront_function.rewrite_index:
    # directory-style URI -> append index.html; extensionless URI -> append /index.html.
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
